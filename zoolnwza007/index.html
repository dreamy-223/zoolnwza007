<!DOCTYPE html>
<html>
    <head>
        <title>zoolnwza007</title>
        <link href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
        <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
        <style>
            html, body {
                background-color: aqua;
                font-family: 'Sarabun', sans-serif;
                font-optical-sizing: auto;
                margin: 0;
                padding: 0;
                background-image: url(BG_MAIN.png);
                backdrop-filter: blur(5px);;
                background-size: cover;
                line-height: 1.5;
            }

            .box {
                width: 85%;
                margin: auto;
            }

            .logo {
                margin: auto;
                display: flex;
                max-width: 40%;
                justify-content: center;
                align-items: center;
                
            }

            .main_button {
                margin: auto;
                display: flex;
                justify-content: center;
                align-items: center;
                width: 20%;
                font-weight: bold;
                color: rgb(255, 255, 255);
                cursor: pointer;
                transition: transform 0.1s, opacity 0.2s;
                padding: 10px;
                font-size: 25px;
                border-radius: 30px;
                box-shadow: 0px 0px 20px 3px ;
                text-shadow: 0px 0px 10px rgba(136, 136, 136, 0.5);
                background: linear-gradient(180deg, #0055FF 0%, #0033CC 100%);
                -webkit-box-pack: center;
                -ms-flex-pack: center;
                cursor: pointer;
                border: solid #404c5d 1px;
                text-decoration: none;
                transition: 500ms;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <img class="logo" src="06391f57-92c3-469e-9a5c-f87e3c821814.png">
            <a class="main_button" href="game1.html" style="margin-bottom: 30px;">START</a>
            <a class="main_button" href="store.html" style="margin-bottom: 30px;">STORE</a>
        </div>
    </body>
</html>
